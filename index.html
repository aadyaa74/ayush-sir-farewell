<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayush Sir </title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: #333;
            text-align: center;
        }

        section {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3em;
        }

        .hero {
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .messages {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .message-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        footer {
            padding: 30px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- 🎬 HERO -->
    <section class="hero">
        <h1>For Ayush Sir</h1>
        <p>"kuch crazy caption suggest karo"</p>
    </section>

    <!-- 📸 PHOTO GALLERY -->
    <section>
        <h2>Memories 📸</h2>
        <div class="gallery">

            <!-- 👉 REPLACE THESE IMAGES -->
            <img src="https://via.placeholder.com/300">
            <img src="https://via.placeholder.com/300">
            <img src="https://via.placeholder.com/300">
            <img src="https://via.placeholder.com/300">

        </div>
    </section>

    <!-- 💌 MESSAGES -->
    <section>
        <h2>Messages from Us </h2>
        <div class="messages">

            <!-- 👉 COPY THIS BLOCK TO ADD MORE -->
            <div class="message-card">
                <h3>person 1</h3>
                <p>xyz</p>
            </div>

            <div class="message-card">
                <h3>person2</h3>
                <p>abc</p>
            </div>

        </div>
    </section>

    <!-- 🥺 SPECIAL 
        <section>
        <h2>Things We'll Miss 🥺</h2>
        <ul>
            <li>Your advice when we needed it most</li>
            <li>Your random jokes 😂</li>
            <li>The way you handled everything so calmly</li>
        </ul>
    </section>
    -->

    <!-- 🎉 FOOTER 
    <footer>
        You'll always be remembered 💫
    </footer>
    -->

    <!-- 🎧 MUSIC -->
    <audio id="bg-music" loop>
        <!-- 👉 REPLACE WITH YOUR SONG LINK -->
        <source src="229848-a1324650-d47b-4d90-86af-e503f7b97d29.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener("click", function () {
            const music = document.getElementById("bg-music");
            music.play();
        }, { once: true });
    </script>

</body>

</html>
